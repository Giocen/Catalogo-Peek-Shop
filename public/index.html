<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>PeekShop | Productos para Mascotas</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- LIBS -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.7/dist/sweetalert2.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.469.0/dist/umd/lucide.min.js"></script>

<link rel="stylesheet" href="/styles/cliente.css">
<link rel="stylesheet" href="/styles/carrito.css">

<style>
/* Animación suave al aplicar filtros */
#productos {
  transition: opacity .25s ease, transform .25s ease;
}
.filtro-aplicando {
  opacity: .5;
  transform: scale(.98);
}
</style>

</head>

<body class="bg-gradient-to-b from-gray-50 to-gray-100 text-gray-800">

  <header id="mainHeader"
  class="sticky top-0 z-50 bg-yellow-400 border-b border-yellow-500">

  <!-- CONTENEDOR HEADER -->
<div class="max-w-7xl mx-auto px-4 py-3
            flex flex-col md:flex-row
            md:items-center md:justify-between
            gap-4">

  <!-- IZQUIERDA: LOGO -->
  <div class="flex items-center justify-between w-full md:w-auto">

    <a href="/" class="flex items-center gap-2 group">

      <img src="/img/logo-peekshop.png"
           class="w-14 h-14 md:w-16 md:h-16
                  object-contain
                  transition-transform duration-300
                  group-hover:scale-105">

      <span class="text-gray-900
                   font-black
                   text-xl md:text-2xl
                   tracking-tight
                   leading-none">
        Peek Shop
      </span>
    </a>

    <!-- FACEBOOK SOLO MÓVIL -->
    <div class="flex md:hidden items-center">

    <a href="https://www.facebook.com/share/1JnhBJnYDL/"
       target="_blank"
      class="w-10 h-10 flex items-center justify-center
              rounded-full bg-white shadow-sm">

      <svg viewBox="0 0 24 24"
          class="w-6 h-6 fill-[#1877F2]">
        <path d="M22 12a10 10 0 1 0-11.6 9.9v-7h-2.5V12h2.5V9.8c0-2.5 1.5-3.8 3.7-3.8 1.1 0 2.2.2 2.2.2v2.4h-1.2c-1.2 0-1.6.8-1.6 1.5V12h2.7l-.4 2.9h-2.3v7A10 10 0 0 0 22 12z"/>
      </svg>

    </a>

  </div>

  </div>


  <!-- CENTRO: BUSCADOR -->
  <div class="w-full md:flex-1 md:px-6">

    <div class="relative w-full md:max-w-2xl md:mx-auto">

      <input id="buscador"
             type="text"
             placeholder="Buscar alimento, juguetes..."
             class="w-full rounded-full px-6 py-3 pr-14 text-sm
                    bg-white shadow-md
                    focus:ring-2 focus:ring-gray-900">

      <button
        class="absolute right-2 top-1/2 -translate-y-1/2
               w-10 h-10
               bg-gray-900 hover:bg-black
               rounded-full flex items-center justify-center">

        <i data-lucide="search"
           class="w-4 h-4 text-white"></i>
      </button>

    </div>
  </div>


  <!-- DERECHA: REDES + CARRITO (SOLO PC) -->
  <div class="hidden md:flex items-center gap-4">

    <!-- FACEBOOK -->
<a href="https://www.facebook.com/share/1JnhBJnYDL/"
   target="_blank"
   class="flex flex-col items-center text-xs text-gray-600 active:text-blue-600 transition">

  <svg viewBox="0 0 24 24"
       class="w-6 h-6 mb-1 text-[#1877F2]"
       fill="currentColor">
    <path d="M22 12a10 10 0 1 0-11.5 9.9v-7h-2.3v-2.9h2.3V9.4c0-2.3 1.4-3.6 3.5-3.6 1 0 2 .2 2 .2v2.3h-1.2c-1.2 0-1.6.8-1.6 1.5v1.8h2.7l-.4 2.9h-2.3v7A10 10 0 0 0 22 12z"/>
  </svg>

  Facebook
</a>

<!-- WHATSAPP -->
<a href="https://wa.me/5219991494268"
   target="_blank"
   class="flex flex-col items-center text-xs text-gray-600 active:text-green-600 transition">

  <svg viewBox="0 0 24 24"
       class="w-6 h-6 mb-1 text-[#25D366]"
       fill="currentColor">
    <path d="M12 2a10 10 0 0 0-8.6 15l-1 3.7 3.8-1A10 10 0 1 0 12 2zm5.3 13.8c-.2.6-1.3 1.2-1.8 1.3-.5.1-1 .2-1.6 0a8.7 8.7 0 0 1-3-1.4 11.3 11.3 0 0 1-3.2-4c-.2-.6-.2-1.1 0-1.6.2-.5.7-1.2 1.1-1.4.4-.2.8-.2 1 0 .3.1.5.4.6.6l.5 1.2c.1.3 0 .6-.1.8l-.3.4c-.1.1-.1.3 0 .4.2.4.6 1 1.2 1.6.7.6 1.3 1 1.7 1.2.1.1.3.1.4 0l.4-.3c.2-.1.5-.2.8-.1l1.2.5c.2.1.5.3.6.6.1.2.1.6 0 1z"/>
  </svg>

  WhatsApp
</a>

    <!-- Carrito -->
    <button id="btnCarritoDesktop"
            class="flex items-center gap-2
                   bg-white px-5 py-2.5
                   rounded-full shadow-sm
                   hover:shadow-md transition relative">

      <i data-lucide="shopping-cart"
         class="w-5 h-5 text-gray-800"></i>

      <span class="text-sm font-semibold text-gray-800">
        Carrito
      </span>

      <span id="carritoCount"
            class="absolute -top-2 -right-2
                   bg-red-500 text-white text-[10px]
                   font-bold px-1.5 py-[2px]
                   rounded-full shadow">
        0
      </span>

    </button>

  </div>

</div>
</header>

<!-- BARRA INFO RESPONSIVE -->
<div class="bg-yellow-500">

  <div class="max-w-7xl mx-auto px-4 py-2">

    <!-- DESKTOP -->
    <div class="hidden md:flex justify-center items-center">
      <div class="flex items-center justify-center gap-8
                  bg-white
                  px-8 py-3
                  rounded-full
                  shadow-md
                  w-fit mx-auto">
                  
          <div class="flex items-center gap-2 text-sm font-semibold text-gray-900 whitespace-nowrap">
            <i data-lucide="truck" class="w-4 h-4"></i>
            Envíos en Ciudad Caucel · Desde GRATIS hasta $25
          </div>

          <div class="w-px h-4 bg-gray-400/40"></div>

        <button class="btn-envios flex items-center gap-2 text-sm font-medium text-gray-900 hover:opacity-70 transition whitespace-nowrap">
          <i data-lucide="truck" class="w-4 h-4"></i>
          Envíos en Mérida
        </button>       

        <button class="btn-horario flex items-center gap-2 text-sm font-medium text-gray-900 hover:opacity-70 transition whitespace-nowrap">
          <i data-lucide="clock" class="w-4 h-4"></i>
          Ver horario
        </button>

        <div class="w-px h-4 bg-gray-400/40"></div>

        <button class="btn-ubicacion flex items-center gap-2 text-sm font-medium text-gray-900 hover:opacity-70 transition whitespace-nowrap">
          <i data-lucide="map-pin" class="w-4 h-4"></i>
          Mi ubicación
        </button>

      </div>
    </div>

    <!-- MOBILE -->
    <div class="flex md:hidden gap-3 overflow-x-auto no-scrollbar">

      <button id="btnEnvios"
        class="btn-envios flex items-center gap-2 text-xs font-medium
               bg-white/20 backdrop-blur-md
               border border-white/40
               px-4 py-2 rounded-full
               whitespace-nowrap">
        <i data-lucide="truck" class="w-4 h-4"></i>
        Envíos
      </button>

      <button id="btnHorario"
        class="btn-horario flex items-center gap-2 text-xs font-medium
               bg-white/20 backdrop-blur-md
               border border-white/40
               px-4 py-2 rounded-full
               whitespace-nowrap">
        <i data-lucide="clock" class="w-4 h-4"></i>
        Horario
      </button>

      <button id="btnUbicacion"
        class="btn-ubicacion flex items-center gap-2 text-xs font-medium
               bg-white/20 backdrop-blur-md
               border border-white/40
               px-4 py-2 rounded-full
               whitespace-nowrap">
        <i data-lucide="map-pin" class="w-4 h-4"></i>
        Ubicación
      </button>

    </div>

  </div>

</div>

<!-- ================= ZONA SUPERIOR ================= -->
<section class="px-4 py-4">
  <div id="zona-superior" class="min-h-[120px]"></div>
</section>

<!-- ================= CONTENIDO ================= -->
<div class="max-w-7xl mx-auto px-4">
  <div class="grid grid-cols-1 md:grid-cols-[240px_1fr] gap-6">

    <!-- SIDEBAR -->
    <aside id="sidebarCategorias"
      class="hidden md:block bg-white rounded-2xl shadow-sm p-5 h-fit sticky top-24 transition-all duration-300">

      <h3 class="font-bold mb-4 text-lg flex items-center gap-2">
        <i data-lucide="grid-2x2" class="w-4 h-4"></i>
        Categorías
      </h3>

      <div id="menuCategorias" class="space-y-2"></div>

      <!-- MARCAS -->
      <div class="mt-6 border-t pt-4">
        <button id="toggleMarcas"
          class="w-full flex justify-between items-center text-sm font-semibold hover:text-yellow-600 transition">
          Marcas
          <i data-lucide="chevron-down" class="w-4 h-4 transition-transform"></i>
        </button>
        <div id="filtroMarcas" class="mt-3 space-y-1 hidden"></div>
      </div>

      <!-- PRECIO -->
      <div class="mt-6">
        <h4 class="font-semibold mb-2 text-sm">Precio</h4>
        <input type="number" id="precioMin" placeholder="Mínimo"
          class="w-full mb-2 border rounded px-2 py-1 text-sm">
        <input type="number" id="precioMax" placeholder="Máximo"
          class="w-full border rounded px-2 py-1 text-sm">
      </div>

      <!-- SOLO OFERTAS + ORDENAR -->
      <div class="mt-6 border-t pt-4 space-y-4">

        <label class="flex items-center gap-2 text-sm cursor-pointer hover:text-yellow-600 transition">
          <input type="checkbox" id="soloOfertas" class="accent-yellow-500">
          Solo ofertas
        </label>

        <div>
          <h4 class="font-semibold mb-2 text-sm">Ordenar</h4>
          <select id="ordenar"
            class="w-full border rounded-lg text-sm px-3 py-2 shadow-sm focus:ring-2 focus:ring-yellow-500">
            <option value="relevancia">Relevancia</option>
            <option value="precio-asc">Menor precio</option>
            <option value="precio-desc">Mayor precio</option>
          </select>
        </div>

      </div>
    </aside>

    <!-- MAIN -->
    <main class="pb-[110px] md:pb-28">

      <div class="flex items-center justify-between mb-4">
        <div id="contadorResultados"
          class="text-sm font-medium text-gray-600"></div>

        <!-- Badge filtros activos -->
        <div id="badgeFiltros"
          class="hidden bg-yellow-100 text-yellow-700 text-xs px-3 py-1 rounded-full shadow-sm">
        </div>
      </div>

      <div id="categorias"
        class="flex gap-2 overflow-x-auto mb-6 pb-2">
      </div>

      <!-- GRID PRODUCTOS -->
      <div id="productos"
        class="grid gap-6 min-h-[300px]
               grid-cols-2 sm:grid-cols-3
               lg:grid-cols-4 xl:grid-cols-4 2xl:grid-cols-5">
      </div>

      <div id="paginacion"
      class="flex justify-center items-center mt-14 mb-10">
  </div>

    </main>

  </div>
</div>


<!-- ================= BOTTOM NAV MÓVIL ====================== -->
<nav class="md:hidden fixed bottom-0 left-0 right-0
            bg-white/95 backdrop-blur-md
            border-t shadow-xl
            flex justify-around items-center py-3 z-30">

  <!-- Inicio -->
  <button onclick="location.href='/'"
          class="flex flex-col items-center text-xs text-gray-600 active:text-yellow-600 transition">
    <i data-lucide="home" class="w-5 h-5 mb-1"></i>
    Inicio
  </button>

  <!-- Categorías -->
  <button onclick="abrirPanelCategorias()"
          class="flex flex-col items-center text-xs text-gray-600 active:text-yellow-600 transition">
    <i data-lucide="grid-2x2" class="w-5 h-5 mb-1"></i>
    Categorías
  </button>

  <!-- Carrito -->
  <button id="btnCarrito"
          class="relative flex flex-col items-center text-xs text-gray-600 active:text-yellow-600 transition">
    <i data-lucide="shopping-cart" class="w-6 h-6 mb-1"></i>
    Carrito
    <span id="carritoCountMobile"
          class="absolute -top-1 right-4 bg-red-500 text-white
                 text-[10px] font-semibold px-1.5 py-[1px]
                 rounded-full shadow">
      0
    </span>
  </button>

  <!-- WhatsApp -->
  <a href="https://wa.me/5219991494268"
     target="_blank"
     class="flex flex-col items-center text-xs text-gray-600 active:text-green-600 transition">
    <i data-lucide="message-circle" class="w-5 h-5 mb-1"></i>
    WhatsApp
  </a>

</nav>
<!-- ================= PANEL MÓVIL ================= -->
<div id="panelCategoriasMobile"
  class="fixed inset-0 bg-black/40 z-50 hidden">

  <div id="panelCategoriasContenido"
     class="bg-white w-80 h-full 
            overflow-y-auto 
            overscroll-contain
            -translate-x-full 
            transition-transform duration-300">

    <div class="p-4 border-b flex justify-between items-center">
      <h3 class="font-semibold">Filtros</h3>
      <button onclick="cerrarPanelCategorias()">✕</button>
    </div>

   <div id="menuCategoriasMobile" class="p-4 space-y-2"></div>

    <!-- MARCAS MÓVIL -->
    <div class="px-4 pb-4 border-t">

      <button id="toggleMarcasMobile"
        class="w-full flex justify-between items-center text-sm font-semibold mt-4">
        Marcas
        <i data-lucide="chevron-down" class="w-4 h-4 transition-transform"></i>
      </button>

      <div id="filtroMarcasMobile"
        class="mt-3 space-y-1 hidden">
      </div>

    </div>

<!-- OFERTAS + ORDEN -->
<div class="p-4 border-t space-y-4">
      <label class="flex items-center gap-2 text-sm">
        <input type="checkbox" id="soloOfertasMobile" class="accent-yellow-500">
        Solo ofertas
      </label>

      <select id="ordenarMobile"
        class="w-full border rounded-lg text-sm px-3 py-2">
        <option value="relevancia">Relevancia</option>
        <option value="precio-asc">Menor precio</option>
        <option value="precio-desc">Mayor precio</option>
      </select>
    </div>

  </div>
</div>

<!-- BOTÓN ADMIN -->
<div id="btnNuevaCategoria"
     class="hidden fixed bottom-24 right-6 z-50">
  <button onclick="crearNuevaCategoria()"
          class="bg-yellow-500 hover:bg-yellow-600 text-white font-semibold px-5 py-3 rounded-full shadow-xl hover:shadow-2xl transition transform hover:scale-105">
    + Nueva categoría
  </button>
</div>

<div id="cart-portal"></div>

<!-- SCRIPTS -->
<script type="module" src="/js/home.js"></script>
<script type="module" src="/js/editor.js"></script>
<script type="module" src="/js/carrito.js"></script>
<script type="module" src="/js/header.js"></script>
<script type="module" src="/js/ui-effects.js"></script>

<script>
lucide.createIcons();
</script>

</body>
</html>
